<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My Wallet">
  <meta name="theme-color" content="#0a0a0a">
  <title>My Wallet</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --text2: #888;
      --text3: #555;
      --green: #00c97a;
      --green-bg: rgba(0,201,122,0.1);
      --red: #ff5a5a;
      --red-bg: rgba(255,90,90,0.1);
      --blue: #4d9fff;
      --blue-bg: rgba(77,159,255,0.1);
      --amber: #ffb547;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* SCROLLABLE CONTENT */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 0 0 100px;
    }

    /* TOP HEADER */
    .header {
      padding: env(safe-area-inset-top, 20px) 20px 0;
      padding-top: calc(env(safe-area-inset-top, 20px) + 16px);
      background: var(--bg);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .app-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .date-chip {
      font-size: 12px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
    }

    /* BALANCE HERO */
    .balance-hero {
      margin: 0 20px 24px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      padding: 24px 20px;
      position: relative;
      overflow: hidden;
    }

    .balance-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(77,159,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .balance-tag {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .balance-number {
      font-size: 44px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 20px;
    }

    .balance-number .currency {
      font-size: 24px;
      font-weight: 400;
      color: var(--text2);
      vertical-align: super;
      margin-right: 2px;
    }

    .balance-pills {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .pill {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 10px 10px;
      border: 0.5px solid var(--border);
    }

    .pill-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .pill-value { font-size: 14px; font-weight: 500; font-family: 'DM Mono', monospace; }
    .pill-value.g { color: var(--green); }
    .pill-value.r { color: var(--red); }
    .pill-value.b { color: var(--blue); }

    /* TABS */
    .tab-bar {
      display: flex;
      margin: 0 20px 20px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 4px;
      border: 0.5px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text3);
      background: transparent;
      border: none;
      padding: 8px 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
      border: 0.5px solid var(--border2);
    }

    /* PANELS */
    .panel { display: none; padding: 0 20px; }
    .panel.active { display: block; }

    /* FORM */
    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      padding: 18px;
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      margin-bottom: 12px;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-input:focus { border-color: var(--blue); }
    .form-input::placeholder { color: var(--text3); }

    select.form-input { cursor: pointer; }

    option { background: #1e1e1e; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }

    .action-btn {
      padding: 14px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .action-btn:active { transform: scale(0.97); }
    .btn-income { background: var(--green); color: #000; }
    .btn-expense { background: var(--red); color: #fff; }

    /* TRANSACTION LIST */
    .section-label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .tx-list { display: flex; flex-direction: column; gap: 8px; }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      padding: 12px 14px;
    }

    .tx-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .tx-dot.income { background: var(--green-bg); }
    .tx-dot.expense { background: var(--red-bg); }

    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .tx-right { text-align: right; flex-shrink: 0; }
    .tx-amount { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; }
    .tx-amount.income { color: var(--green); }
    .tx-amount.expense { color: var(--red); }

    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 16px; padding: 4px;
      transition: color 0.15s;
    }
    .del-btn:active { color: var(--red); }

    /* SPENDING CHART */
    .bar-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .bar-cat { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--red); border-radius: 3px; transition: width 0.4s ease; }
    .bar-val { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; width: 56px; text-align: right; flex-shrink: 0; }

    /* GOALS */
    .goal-item {
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      padding: 14px;
      margin-bottom: 10px;
    }
    .goal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .goal-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .goal-pct { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--blue); }
    .goal-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .goal-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.4s ease; }
    .goal-sub { font-size: 11px; color: var(--text3); }

    /* TIPS */
    .tip-item {
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .tip-emoji { font-size: 20px; flex-shrink: 0; }
    .tip-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .tip-body { font-size: 12px; color: var(--text2); line-height: 1.6; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      background: var(--surface);
      border-top: 0.5px solid var(--border2);
      padding-bottom: env(safe-area-inset-bottom, 8px);
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 0 6px;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-icon { font-size: 22px; transition: transform 0.15s; }
    .nav-label { font-size: 10px; font-family: 'DM Sans', sans-serif; color: var(--text3); letter-spacing: 0.04em; }
    .nav-btn.active .nav-icon { transform: translateY(-1px); }
    .nav-btn.active .nav-label { color: var(--blue); }

    .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }

    .divider { height: 0.5px; background: var(--border); margin: 16px 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <span class="app-name">My Wallet</span>
      <span class="date-chip" id="date-label"></span>
    </div>
    <div class="balance-hero">
      <div class="balance-tag">Current Balance</div>
      <div class="balance-number"><span class="currency">$</span><span id="main-balance">0.00</span></div>
      <div class="balance-pills">
        <div class="pill"><div class="pill-label">Income</div><div class="pill-value g" id="m-income">0</div></div>
        <div class="pill"><div class="pill-label">Spent</div><div class="pill-value r" id="m-expense">0</div></div>
        <div class="pill"><div class="pill-value b" id="m-saved">0</div><div class="pill-label">Saved</div></div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('add',this)">Add</button>
      <button class="tab-btn" onclick="switchTab('history',this)">History</button>
      <button class="tab-btn" onclick="switchTab('spending',this)">Spending</button>
      <button class="tab-btn" onclick="switchTab('tips',this)">Tips</button>
    </div>
  </div>

  <div class="content">
    <!-- ADD -->
    <div id="tab-add" class="panel active">
      <div class="form-card">
        <label class="form-label">Amount</label>
        <input class="form-input" type="number" id="tx-amount" placeholder="0.00" inputmode="decimal" min="0" step="0.01">
        <label class="form-label">Category</label>
        <select class="form-input" id="tx-cat">
          <option value="Salary">💼 Salary</option>
          <option value="Freelance">💻 Freelance</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Bills">📄 Bills</option>
          <option value="Health">❤️ Health</option>
          <option value="Education">📚 Education</option>
          <option value="Other">📦 Other</option>
        </select>
        <label class="form-label">Description</label>
        <input class="form-input" type="text" id="tx-desc" placeholder="What was this for?">
        <div class="btn-row">
          <button class="action-btn btn-income" onclick="addTx('income')">+ Income</button>
          <button class="action-btn btn-expense" onclick="addTx('expense')">− Expense</button>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="tab-history" class="panel">
      <div class="section-label">All transactions</div>
      <div class="tx-list" id="tx-list"><div class="empty">No transactions yet.<br>Add your first one above.</div></div>
    </div>

    <!-- SPENDING -->
    <div id="tab-spending" class="panel">
      <div class="section-label">Spending by category</div>
      <div id="spending-chart"><div class="empty">No expenses yet.</div></div>
      <div class="divider"></div>
      <div class="section-label">Savings goals</div>
      <div class="form-card">
        <label class="form-label">Goal name</label>
        <input class="form-input" type="text" id="goal-name" placeholder="e.g. New iPhone">
        <label class="form-label">Target ($)</label>
        <input class="form-input" type="number" id="goal-target" placeholder="1000" inputmode="decimal">
        <button class="action-btn btn-income" style="width:100%;margin-top:4px;" onclick="addGoal()">Set Goal</button>
      </div>
      <div id="goals-list"></div>
    </div>

    <!-- TIPS -->
    <div id="tab-tips" class="panel">
      <div class="section-label">Personalized advice</div>
      <div id="tips-list"><div class="empty">Add transactions first<br>to get personalized tips.</div></div>
    </div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

  let txs = JSON.parse(localStorage.getItem('wallet_tx') || '[]');
  let goals = JSON.parse(localStorage.getItem('wallet_goals') || '[]');

  document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  const catEmoji = {Salary:'💼',Freelance:'💻',Food:'🍔',Transport:'🚗',Shopping:'🛍️',Entertainment:'🎮',Bills:'📄',Health:'❤️',Education:'📚',Other:'📦'};

  function save() {
    localStorage.setItem('wallet_tx', JSON.stringify(txs));
    localStorage.setItem('wallet_goals', JSON.stringify(goals));
  }

  function fmt(n) { return parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function addTx(type) {
    const amount = parseFloat(document.getElementById('tx-amount').value);
    const cat = document.getElementById('tx-cat').value;
    const desc = document.getElementById('tx-desc').value.trim() || cat;
    if (!amount || amount <= 0) { alert('Enter a valid amount.'); return; }
    txs.unshift({ id: Date.now(), type, amount, cat, desc, date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) });
    document.getElementById('tx-amount').value = '';
    document.getElementById('tx-desc').value = '';
    save(); render();
  }

  function deleteTx(id) {
    txs = txs.filter(t => t.id !== id);
    save(); render();
  }

  function addGoal() {
    const name = document.getElementById('goal-name').value.trim();
    const target = parseFloat(document.getElementById('goal-target').value);
    if (!name || !target || target <= 0) { alert('Fill in goal name and target.'); return; }
    goals.push({ id: Date.now(), name, target });
    document.getElementById('goal-name').value = '';
    document.getElementById('goal-target').value = '';
    save(); render();
  }

  function deleteGoal(id) {
    goals = goals.filter(g => g.id !== id);
    save(); render();
  }

  function render() {
    const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const balance = income - expense;
    const saved = Math.max(0, balance);

    document.getElementById('main-balance').textContent = fmt(balance);
    document.getElementById('m-income').textContent = '$'+fmt(income);
    document.getElementById('m-expense').textContent = '$'+fmt(expense);
    document.getElementById('m-saved').textContent = '$'+fmt(saved);

    const list = document.getElementById('tx-list');
    list.innerHTML = txs.length === 0
      ? '<div class="empty">No transactions yet.<br>Add your first one above.</div>'
      : txs.map(t=>`
        <div class="tx-item">
          <div class="tx-dot ${t.type}">${catEmoji[t.cat]||'📦'}</div>
          <div class="tx-info">
            <div class="tx-desc">${t.desc}</div>
            <div class="tx-sub">${t.date} · ${t.cat}</div>
          </div>
          <div class="tx-right">
            <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}$${fmt(t.amount)}</div>
          </div>
          <button class="del-btn" onclick="deleteTx(${t.id})">✕</button>
        </div>`).join('');

    const catTotals = {};
    txs.filter(t=>t.type==='expense').forEach(t=>{ catTotals[t.cat]=(catTotals[t.cat]||0)+t.amount; });
    const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    const maxV = sorted[0]?.[1]||1;
    const chart = document.getElementById('spending-chart');
    chart.innerHTML = sorted.length === 0
      ? '<div class="empty">No expenses yet.</div>'
      : sorted.map(([cat,val])=>`
        <div class="bar-row">
          <div class="bar-cat">${catEmoji[cat]||''} ${cat}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(val/maxV*100).toFixed(1)}%"></div></div>
          <div class="bar-val">$${fmt(val)}</div>
        </div>`).join('');

    const goalsList = document.getElementById('goals-list');
    goalsList.innerHTML = goals.length === 0
      ? '<div class="empty" style="padding:10px 0;">No goals yet.</div>'
      : goals.map(g=>{
        const pct = Math.min(100,(saved/g.target*100));
        return `<div class="goal-item">
          <div class="goal-header">
            <div class="goal-name">${g.name}</div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="goal-pct">${pct.toFixed(0)}%</div>
              <button class="del-btn" onclick="deleteGoal(${g.id})">✕</button>
            </div>
          </div>
          <div class="goal-track"><div class="goal-fill" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="goal-sub">$${fmt(saved)} saved of $${fmt(g.target)} target</div>
        </div>`;}).join('');

    renderTips(income, expense, saved, catTotals);
  }

  function renderTips(income, expense, saved, catTotals) {
    const tips = [];
    const saveRate = income > 0 ? saved/income*100 : 0;

    if (income === 0 && expense === 0) {
      document.getElementById('tips-list').innerHTML = '<div class="empty">Add transactions first<br>to get personalized tips.</div>';
      return;
    }

    if (expense > income) {
      tips.push({e:'🚨',t:'You\'re overspending',b:`You've spent $${fmt(expense-income)} more than you earned. Cut non-essentials immediately.`});
    } else if (saveRate >= 20) {
      tips.push({e:'🏆',t:'Excellent saving rate',b:`You're saving ${saveRate.toFixed(0)}% of income. The recommended target is 20% — you're crushing it.`});
    } else if (income > 0) {
      tips.push({e:'🎯',t:'Aim for 20% savings',b:`You're saving ${saveRate.toFixed(0)}% right now. To hit 20%, you need to cut $${fmt(expense-(income*0.8))} in spending.`});
    }

    const top = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
    if (top && income > 0) {
      tips.push({e:'📊',t:`${top[0]} is your top expense`,b:`You spent $${fmt(top[1])} on ${top[0]} — ${(top[1]/income*100).toFixed(0)}% of income. Try cutting it by 15% next month.`});
    }

    if (catTotals['Food'] && income > 0 && catTotals['Food']/income > 0.15) {
      tips.push({e:'🍔',t:'Food budget is too high',b:`Food is ${(catTotals['Food']/income*100).toFixed(0)}% of income. Meal prepping can easily cut this in half.`});
    }

    if (catTotals['Entertainment'] && income > 0 && catTotals['Entertainment']/income > 0.1) {
      tips.push({e:'🎮',t:'Entertainment over 10%',b:`Try setting a weekly entertainment cash limit to stay under 10% of income.`});
    }

    if (saved > 0) {
      tips.push({e:'🏦',t:'Automate your savings',b:`Move $${fmt(saved)} to a separate savings account the moment your income arrives. Out of sight, out of spend.`});
    }

    if (tips.length === 0) {
      tips.push({e:'✅',t:'Looking good',b:'Keep logging your transactions and tips will get more specific as you build history.'});
    }

    document.getElementById('tips-list').innerHTML = tips.map(t=>`
      <div class="tip-item">
        <div class="tip-emoji">${t.e}</div>
        <div><div class="tip-title">${t.t}</div><div class="tip-body">${t.b}</div></div>
      </div>`).join('');
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
    btn.classList.add('active');
  }

  render();
</script>
</body>
</html>
